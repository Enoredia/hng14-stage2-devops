version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 128m
    cpus: "0.25"

  api:
    build: ./api
    container_name: api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
    ports:
      - "${API_PORT}:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: "0.50"

  worker:
    build: ./worker
    container_name: worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
      WORKER_HEALTH_KEY: ${WORKER_HEALTH_KEY}
    networks:
      - app-network
    mem_limit: 256m
    cpus: "0.50"

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL}
      PORT: ${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - app-network
    mem_limit: 256m
    cpus: "0.50"

networks:
  app-network:
    driver: bridge