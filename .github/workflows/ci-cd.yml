name: Stage 2 CI/CD Pipeline

on:
  push:
    branches:
      - "*"

env:
  REGISTRY: localhost:5000
  API_IMAGE: localhost:5000/api
  WORKER_IMAGE: localhost:5000/worker
  FRONTEND_IMAGE: localhost:5000/frontend

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Python with flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          cd api
          pip install -r requirements.txt
          flake8 .


      - name: Run JavaScript lint with eslint
        run: |
          cd frontend
          npm ci
          npx eslint app.js

      - name: Lint Dockerfiles with hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run API tests with coverage
        run: |
          python -m pip install --upgrade pip
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scanning
        run: |
          docker build -t $API_IMAGE:${{ github.sha }} ./api
          docker build -t $WORKER_IMAGE:${{ github.sha }} ./worker
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./frontend

      - name: Run Trivy scan on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan on worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-reports
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cp .env.example .env

      - name: Start full stack
        run: |
          docker compose up --build -d

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:3000/health; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Submit job and poll until completed
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "$RESPONSE"

          JOB_ID=$(echo "$RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in {1..30}; do
            STATUS_RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            echo "$STATUS_RESPONSE"

            STATUS=$(echo "$STATUS_RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin)['status'])")

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi

            sleep 2
          done

          echo "Job did not complete in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v

      - name: Run integration test script
        :wq
        run: ./tests/integration.sh

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Simulate rolling deployment
        run: |
          chmod +x scripts/rolling-deploy.sh
          ./scripts/rolling-deploy.sh
