name: Stage 2 CI/CD Pipeline

on:
  push:
    branches:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: localhost:5000
  API_IMAGE: localhost:5000/api
  WORKER_IMAGE: localhost:5000/worker
  FRONTEND_IMAGE: localhost:5000/frontend

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Python with flake8
        run: |
          python -m pip install --upgrade pip
          cd api
          pip install -r requirements.txt
          flake8 .

      - name: Run JavaScript lint with eslint
        run: |
          cd frontend
          npm ci
          npx eslint app.js

      - name: Lint API Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < api/Dockerfile

      - name: Lint worker Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < worker/Dockerfile

      - name: Lint frontend Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run API tests with coverage
        run: |
          python -m pip install --upgrade pip
          cd api
          pip install -r requirements.txt
          pytest --cov=. --cov-report=xml

      - name: Upload API coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild API image for scan
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Rebuild worker image for scan
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Rebuild frontend image for scan
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create environment file
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Run integration test script
        run: ./tests/integration.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run scripted rolling deployment
        run: |
          chmod +x scripts/rolling-deploy.sh
          ./scripts/rolling-deploy.sh
